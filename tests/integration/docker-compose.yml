services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: atlas_test
      POSTGRES_PASSWORD: atlas_test
      POSTGRES_DB: atlas_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_test"]
      interval: 2s
      timeout: 5s
      retries: 20
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: atlas_test
      MYSQL_USER: atlas
      MYSQL_PASSWORD: atlas_pass
    ports:
      - "3307:3306"
    command:
      [
        "--default-authentication-plugin=mysql_native_password",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
      ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "atlas", "-patlas_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./mysql_setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
  mariadb:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: root_pass
      MARIADB_DATABASE: atlas_test
      MARIADB_USER: atlas
      MARIADB_PASSWORD: atlas_pass
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./mysql_setup.sql:/docker-entrypoint-initdb.d/01_setup.sql
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AtlasStrongPass!123"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'AtlasStrongPass!123' -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
