name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc make

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=77" "wheel>=0.42"
          python -m pip install --no-build-isolation -e ".[dev]"

      - name: Build native sigilo library
        if: runner.os != 'Windows'
        run: make build-c

      - name: Build native sigilo library (Windows)
        if: runner.os == 'Windows'
        run: python atlas/_c/build_lib.py build

      - name: Check sigilo build
        run: python scripts/check_sigilo_build.py

      - name: Build release artifacts
        run: python -m build --sdist --wheel --no-isolation

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Run full Atlas regression suite (Linux)
        if: runner.os == 'Linux'
        run: bash tests/run_tests.sh

      - name: Run portable regression subset (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pytest --no-cov \
            tests/test_c_render.py \
            tests/test_sigilo_3b.py \
            tests/test_layout_4c.py \
            tests/integration/phase_14/test_public_api_14a.py \
            tests/integration/phase_14/test_regression_14b.py \
            tests/integration/phase_14/test_distribution_14c.py

      - name: Run portable regression subset (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m pytest --no-cov \
            tests/test_c_render.py \
            tests/test_sigilo_3b.py \
            tests/test_layout_4c.py \
            tests/integration/phase_14/test_public_api_14a.py \
            tests/integration/phase_14/test_regression_14b.py \
            tests/integration/phase_14/test_distribution_14c.py

      - name: Check Windows DLL visibility
        if: runner.os == 'Windows'
        run: python -c "import atlas._sigilo as s; print('Native:', s.available(), s.library_path())"

      - name: Lint
        run: python -m ruff check atlas tests

      - name: Type check
        run: python -m mypy atlas
