name: Publish Distribution

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc make

      - name: Set up QEMU for ARM builds (Linux)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Verify system deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --version

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=77" "wheel>=0.42" cibuildwheel build pdoc twine

      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist/wheels

      - name: Validate built wheels
        run: python -m twine check dist/wheels/*

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/wheels/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=77" "wheel>=0.42" build pdoc twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install publish dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@release/v1

  build-docs:
    name: Build API docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=77" "wheel>=0.42"
          python -m pip install --no-build-isolation -e ".[dev]"

      - name: Generate API docs
        run: |
          pdoc atlas atlas.ai atlas.analysis atlas.export atlas.search --output-directory site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-docs:
    name: Deploy API docs
    needs: build-docs
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
